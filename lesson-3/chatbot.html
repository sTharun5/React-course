<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Chatbot</title>
    </head>

    <body>
        <div class="container"></div>
        <script
            src="https://unpkg.com/supersimpledev/react.js"
            crossorigin
        ></script>
        <script
            src="https://unpkg.com/supersimpledev/react-dom.js"
            crossorigin
        ></script>

        <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
        <script src="https://unpkg.com/supersimpledev/babel.js"></script>

        <script type="text/babel">
            const { useState } = React;
            function ChatInput({ curr, updateFunc , isLoading, setIsLoading}) {
                const [currText, setCurrText] = useState('');

                function getText(event) {
                    setCurrText(event.target.value);
                }

                async function sendMessage() {


                    if(isLoading == true)return;
                    const text =  currText;
                    if(text.length == 0)return;
                    setCurrText('');

                    const store = [
                        ...curr,
                        {
                            message: text,
                            sender: 'user',
                            key: crypto.randomUUID(),
                        },
                    ];
                    updateFunc(store);


                    updateFunc([
                        ...store,
                        {
                            message: "waiting...",
                            sender: 'robot',
                            key: crypto.randomUUID(),
                        },
                    ]);

                     console.log('waiting...');
                     let response;

                     setIsLoading(true);
                     // Chatbot.getResponse(currText) no latency
                     try{
                      response = await Chatbot.getResponseAsync(text);
                    }
                    catch(err){
                      response = "Sorry, something went wrong.";
                    }
                    finally{
                    setIsLoading(false);
                    }

                    updateFunc([
                        ...store,
                        {
                            message: response,
                            sender: 'robot',
                            key: crypto.randomUUID(),
                        },
                    ]);

                }

                // onKeyDown is a event... like onChange onClick

                function enterDetect(event) {
                    if (event.code == 'Enter') {
                        sendMessage();
                    }
                    if (event.code == 'Escape') {
                        setCurrText('');
                    }
                }

                return (
                    <>
                        <input
                            type="textbox"
                            placeholder="send a message to the chatbot"
                            size="30"
                            onChange={getText}
                            value={currText}
                            onKeyDown={enterDetect}
                            disabled={isLoading}
                        />

                        <button onClick={sendMessage} disabled={isLoading} >send</button>
                    </>
                );
            }

            function ChatMessage({ message, sender }) {
                return (
                    <div>
                        {sender === 'robot' && (
                            <img src="robot.png" alt="robot image" width="50" />
                        )}
                        {message}
                        {sender === 'user' && (
                            <img src="user.png" alt="user image" width="50" />
                        )}
                    </div>
                );
            }

            function ChatMessages({ curr, updateFunc }) {
                return (
                    <>
                        {curr.map((chatmessage) => {
                            return (
                                <ChatMessage
                                    key={chatmessage.key}
                                    message={chatmessage.message}
                                    sender={chatmessage.sender}
                                />
                            );
                        })}
                    </>
                );
            }

            const container = document.querySelector('.container');

            function App() {
                const [curr, updateFunc] = React.useState([]);
                const [isLoading,setIsLoading] = useState(false);

                return (
                    <>
                        <ChatInput curr={curr} updateFunc={updateFunc} isLoading={isLoading} setIsLoading={setIsLoading}/>
                        <ChatMessages curr={curr} updateFunc={updateFunc} />
                    </>
                );
            }
            ReactDOM.createRoot(container).render(<App />);
        </script>
    </body>
</html>
