<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <style>

            * {
                font-size: 16px;
                font-family: Arial, Helvetica, sans-serif;
                box-sizing: border-box;
                margin-top: 0px;
                margin-bottom: 0px;

            }

            .chatbot-container{
                display: flex;
                flex-direction: column;
                justify-content: end;
                height: 100vh;
                font-size: 15px;
                max-width: 600px;
                margin-left: auto;
                margin-right: auto;
                margin-top:20px;

            }

            .chat-input-container {

                display: flex;
                flex-direction: row;
                margin-bottom: 30px;


            }
            .chat-input {
                padding: 12px 15px;
                outline: none;
                margin-right:10px;
                border-radius: 10px;
                border-width: 1px;
                flex-grow: 1;
            }

            .send-button {
                background-color: rgb(25, 135, 84);
                color: white;
                padding: 10px 20px;
                font-size: 15px;
                margin-left: 10px;
                border: none;
                border-radius: 10px;
                cursor: pointer;
            }

            .chat-messages-container{
                display: flex;
                flex-direction: column;
                overflow: scroll;
        scrollbar-width: none;

            }

            .chat-messenger-robot{
                align-self: flex-start;
                display: flex;
                align-items: start;

            }
            .chat-messenger-user{
                 align-self: flex-end;
                  display: flex;
                  flex-direction: row;
                   align-items: start;

            }
            .chat-message-text{
                align-self: center;
                background-color: rgb(238, 238, 238);
                 padding: 15px 20px;
                  margin-bottom: 20px;
                max-width: 300px;
                margin-left: 10px;
                margin-right: 10px;
                border-radius: 10px;
            }

              .chat-message-profile {
        width: 45px;
      }






        </style>
        <title>Chatbot</title>
    </head>

    <body>
        <div class="container"></div>
        <script
            src="https://unpkg.com/supersimpledev/react.js"
            crossorigin
        ></script>
        <script
            src="https://unpkg.com/supersimpledev/react-dom.js"
            crossorigin
        ></script>

        <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
        <script src="https://unpkg.com/supersimpledev/babel.js"></script>

        <script type="text/babel">
            const { useState } = React;
            function ChatInput({ curr, updateFunc, isLoading, setIsLoading }) {
                const [currText, setCurrText] = useState('');

                function getText(event) {
                    setCurrText(event.target.value);
                }

                async function sendMessage() {
                    if (isLoading == true) return;
                    const text = currText;
                    if (text.length == 0) return;
                    setCurrText('');

                    const store = [
                        ...curr,
                        {
                            message: text,
                            sender: 'user',
                            key: crypto.randomUUID(),
                        },
                    ];
                    updateFunc(store);

                    updateFunc([
                        ...store,
                        {
                            message: 'waiting...',
                            sender: 'robot',
                            key: crypto.randomUUID(),
                        },
                    ]);

                    console.log('waiting...');
                    let response;

                    setIsLoading(true);
                    // Chatbot.getResponse(currText) no latency
                    try {
                        response = await Chatbot.getResponseAsync(text);
                    } catch (err) {
                        response = 'Sorry, something went wrong.';
                    } finally {
                        setIsLoading(false);
                    }

                    updateFunc([
                        ...store,
                        {
                            message: response,
                            sender: 'robot',
                            key: crypto.randomUUID(),
                        },
                    ]);
                }

                // onKeyDown is a event... like onChange onClick

                function enterDetect(event) {
                    if (event.code == 'Enter') {
                        sendMessage();
                    }
                    if (event.code == 'Escape') {
                        setCurrText('');
                    }
                }

                return (
                    <div className="chat-input-container">
                        <input
                            type="textbox"
                            placeholder="send a message to the chatbot"
                            size="30"
                            onChange={getText}
                            value={currText}
                            onKeyDown={enterDetect}
                            disabled={isLoading}
                            className="chat-input"
                        />

                        <button
                            onClick={sendMessage}
                            disabled={isLoading}
                            className="send-button"
                        >
                            send
                        </button>
                    </div>
                );
            }

            function ChatMessage({ message, sender }) {
                return (
                    <div className = {sender === 'robot' ? 'chat-messenger-robot':'chat-messenger-user'}>
                        {sender === 'robot' && (
                            <img src="robot.png" alt="robot image" width="50" className="chat-message-profile" />
                        )}
                         <div className="chat-message-text">
                        {message}
                        </div>
                        {sender === 'user' && (
                            <img src="user.png" alt="user image" width="50" className="chat-message-profile"/>
                        )}
                    </div>
                );
            }

            function ChatMessages({ curr, updateFunc }) {
                const useref = React.useRef(null);

                React.useEffect(()=>{
                    useref.current.scrollTop = useref.current.scrollHeight;
                },[curr]);

                return (
                    <div className="chat-messages-container" ref = {useref}>
                        {curr.map((chatmessage) => {
                            return (
                                <ChatMessage
                                    key={chatmessage.key}
                                    message={chatmessage.message}
                                    sender={chatmessage.sender}
                                />
                            );
                        })}
                    </div>
                );
            }

            const container = document.querySelector('.container');

            function App() {
                const [curr, updateFunc] = React.useState([]);
                const [isLoading, setIsLoading] = useState(false);

                return (
                    <div className="chatbot-container">
                     <ChatMessages curr={curr} updateFunc={updateFunc} />
                        <ChatInput
                            curr={curr}
                            updateFunc={updateFunc}
                            isLoading={isLoading}
                            setIsLoading={setIsLoading}
                        />

                    </div>
                );
            }
            ReactDOM.createRoot(container).render(<App />);
        </script>
    </body>
</html>
