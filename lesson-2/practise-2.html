<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <div class="container"></div>
        <script
            src="https://unpkg.com/supersimpledev/react.js"
            crossorigin
        ></script>
        <script
            src="https://unpkg.com/supersimpledev/react-dom.js"
            crossorigin
        ></script>
        <script src="https://unpkg.com/supersimpledev/babel.js"></script>

        <script type="text/babel">
            const container = document.querySelector('.container');

            function ProductDetails({ name, price, discountPrice, img_url }) {
                return (
                    <>
                        <div>
                            <img src={img_url} width="50" />
                        </div>
                        <div>
                            <p>{name}</p>
                        </div>

                        <div>
                            {discountPrice ? (
                                <del>
                                    {' '}
                                    <p>price : ${price}</p>{' '}
                                </del>
                            ) : (
                                <p>price : ${price}</p>
                            )}
                        </div>
                        {discountPrice && (
                            <div>
                                {' '}
                                <p>Discountprice : ${discountPrice}</p>{' '}
                            </div>
                        )}
                        <div>
                            <button>add to cart</button>
                        </div>
                    </>
                );
            }
            function App() {
                return (
                    <>
                        <ProductDetails
                            name="Cotton socks"
                            price="10.09"
                            discountPrice="5.09"
                            img_url="https://supersimple.dev/images/cotton-socks.png"
                        />
                        <ProductDetails
                            name="T-shirt"
                            price="7.99"
                            img_url="https://supersimple.dev/images/plain-t-shirt.png"
                        />
                        <ProductDetails
                            name="Tennis ball"
                            price="6.00"
                            img_url="https://supersimple.dev/images/tennis-balls.png"
                        />
                    </>
                );
            }

            ReactDOM.createRoot(container).render(<App />);
        </script>
    </body>
</html>
