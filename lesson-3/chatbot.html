<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Chatbot</title>
    </head>

    <body>
        <div class="container"></div>
        <script
            src="https://unpkg.com/supersimpledev/react.js"
            crossorigin
        ></script>
        <script
            src="https://unpkg.com/supersimpledev/react-dom.js"
            crossorigin
        ></script>

        <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
        <script src="https://unpkg.com/supersimpledev/babel.js"></script>

        <script type="text/babel">
            const { useState } = React;
            function ChatInput({ curr, updateFunc }) {
                const [currText, setCurrText] = useState('');

                function getText(event) {
                    setCurrText(event.target.value);
                }

                function sendMessage() {
                    const store = [ ...curr,{ message: currText,sender: 'user',key: crypto.randomUUID() }];
                    updateFunc(store);

                    updateFunc([
                        ...store,
                        {
                            message: Chatbot.getResponse(currText),
                            sender: 'robot',
                            key: crypto.randomUUID(),
                        },
                    ]);
                    setCurrText('');
                }

                return (
                    <>
                        <input
                            type="textbox"
                            placeholder="send a message to the chatbot"
                            size="30"
                            onChange={getText}
                            value={currText}
                        />

                        <button onClick={sendMessage}>send</button>
                    </>
                );
            }

            function ChatMessage({ message, sender }) {
                return (
                    <div>
                        {sender === 'robot' && (
                            <img src="robot.png" alt="robot image" width="50" />
                        )}
                        {message}
                        {sender === 'user' && (
                            <img src="user.png" alt="user image" width="50" />
                        )}
                    </div>
                );
            }

            function ChatMessages({ curr, updateFunc }) {
                return (
                    <>
                        {curr.map((chatmessage) => {
                            return (
                                <ChatMessage
                                    key={chatmessage.key}
                                    message={chatmessage.message}
                                    sender={chatmessage.sender}
                                />
                            );
                        })}
                    </>
                );
            }

            const container = document.querySelector('.container');

            function App() {
                
                const [curr, updateFunc] = React.useState([]);

                return (
                    <>
                        <ChatInput curr={curr} updateFunc={updateFunc} />
                        <ChatMessages curr={curr} updateFunc={updateFunc} />
                    </>
                );
            }
            ReactDOM.createRoot(container).render(<App />);
        </script>
    </body>
</html>
