<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <div class="container"></div>
        <script
            src="https://unpkg.com/supersimpledev/react.js"
            crossorigin
        ></script>
        <script
            src="https://unpkg.com/supersimpledev/react-dom.js"
            crossorigin
        ></script>
        <script src="https://unpkg.com/supersimpledev/babel.js"></script>

        <script type="text/babel">
            const container = document.querySelector('.container');

            function ProductDetails({ name, price }) {
                return (
                    <>
                        <div>
                            <p>{name}</p>
                        </div>
                        <div>
                            <p>price : ${price}</p>
                        </div>
                        <div>
                            <button>add to cart</button>
                        </div>
                    </>
                );
            }
            function App() {
                return (
                    <>
                        <ProductDetails name="Cotton socks" price="10.09" />
                        <ProductDetails name="T-shirt" price="7.99" />
                        <ProductDetails name="Tennis ball" price="6.00" />
                    </>
                );
            }

            ReactDOM.createRoot(container).render(<App />);
        </script>
    </body>
</html>
