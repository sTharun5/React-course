<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        * {
            font-size: 16px;
            font-family: Arial, Helvetica, sans-serif;
            box-sizing: border-box;
            margin-top: 0px;
            margin-bottom: 0px;

        }

        .chatbot-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-size: 15px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .chatbot-box {
            display: flex;
            flex-direction: column;
            padding: 10px;
            flex: 1;
        }

        .chatbot-box-top {
            display: flex;
            flex-direction: column-reverse;
            padding: 10px;
            flex: 1;
        }

        .chat-input-container {
            display: flex;
            flex-direction: row;
        }

        .chat-input {
            padding: 12px 15px;
            outline: none;
            margin-right: 10px;
            border-radius: 10px;
            border-width: 1px;
            flex-grow: 1;
        }

        .send-button {
            background-color: rgb(25, 135, 84);
            color: white;
            padding: 10px 20px;
            font-size: 15px;
            margin-left: 10px;
            border: none;
            border-radius: 10px;
            cursor:pointer;
        }

        .chat-messages-container {
            display: flex;
            padding-top: 15px;
            flex-direction: column;
            overflow: scroll;
            scrollbar-width: none;
            flex: 1;

        }

        .chat-messenger-robot {
            align-self: flex-start;
            display: flex;
            align-items: start;

        }

        .chat-messenger-user {
            align-self: flex-end;
            display: flex;
            flex-direction: row;
            align-items: start;

        }

        .chat-message-text {
            align-self: center;
            background-color: rgb(238, 238, 238);
            padding: 15px 20px;
            margin-bottom: 20px;
            max-width: 300px;
            margin-left: 10px;
            margin-right: 10px;
            border-radius: 10px;
        }

        .footer-container {
            bottom: 0;
        }

        .footer {
             background: white;
    border-top: 1px solid #ddd;
    padding: 15px;
    display: flex;
    justify-content: center;
    align-items: center;
        }


        .footer div {
    background-color: rgb(25, 135, 84);
    color: white;
    padding: 10px 20px;
    border-radius: 25px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    transition: all 0.2s ease;
    user-select: none;
}

.footer div:hover {
    background-color: rgb(20, 110, 68);
    transform: translateY(-2px);
}

.footer div:active {
    transform: scale(0.98);
}

        .chat-message-profile {
            width: 45px;
        }


        .loader-dots {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: black;
            border-radius: 50%;
            animation: bounce 0.6s ease-in-out infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.15s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes bounce {
            0% {
                transform: translateY(0) scale(1);
                opacity: 0.5;
            }

            50% {
                transform: translateY(-8px) scale(1.3);
                opacity: 1;
            }

            100% {
                transform: translateY(0) scale(1);
                opacity: 0.5;
            }
        }
    </style>
    <title>Chatbot</title>
</head>

<body>
    <div class="container"></div>
    <script src="https://unpkg.com/supersimpledev/react.js" crossorigin></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js" crossorigin></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script type="text/babel">
        const { useState } = React;
        function ChatInput({ curr, updateFunc, isLoading, setIsLoading }) {
            const [currText, setCurrText] = useState('');

            function getText(event) {
                setCurrText(event.target.value);
            }

            async function sendMessage() {
                if (isLoading == true) return;
                const text = currText;
                if (text.length == 0) return;
                setCurrText('');

                const store = [
                    ...curr,
                    {
                        message: text,
                        sender: 'user',
                        key: crypto.randomUUID(),
                    },
                ];
                updateFunc(store);

                updateFunc([
                    ...store,
                    {
                        message: 'waiting...',
                        sender: 'robot',
                        key: crypto.randomUUID(),
                    },
                ]);

                console.log('waiting...');
                let response;

                setIsLoading(true);
                // Chatbot.getResponse(currText) no latency
                try {
                    response = await Chatbot.getResponseAsync(text);
                } catch (err) {
                    response = 'Sorry, something went wrong.';
                } finally {
                    setIsLoading(false);
                }

                updateFunc([
                    ...store,
                    {
                        message: response,
                        sender: 'robot',
                        key: crypto.randomUUID(),
                    },
                ]);
            }

            // onKeyDown is a event... like onChange onClick

            function enterDetect(event) {
                if (event.code == 'Enter') {
                    sendMessage();
                }
                if (event.code == 'Escape') {
                    setCurrText('');
                }
            }

            return (
                <div className="chat-input-container">
                    <input
                        type="textbox"
                        placeholder="send a message to the chatbot"
                        size="30"
                        onChange={getText}
                        value={currText}
                        onKeyDown={enterDetect}
                        disabled={isLoading}
                        className="chat-input"
                    />

                    <button
                        onClick={sendMessage}
                        disabled={isLoading}
                        className="send-button"
                    >
                        send
                    </button>

                </div>
            );
        }

        function Loader() {
            return (
                <div className="loader-dots">
                    <div className="dot"></div>
                    <div className="dot"></div>
                    <div className="dot"></div>
                </div>
            );
        }

        function ChatMessage({ message, sender, isLoading }) {
            return (
                <div className={sender === 'robot' ? 'chat-messenger-robot' : 'chat-messenger-user'}>
                    {sender === 'robot' && (
                        <img src="robot.png" alt="robot image" width="50" className="chat-message-profile" />
                    )}

                    <div className="chat-message-text">
                        {message == "waiting..." ? (<Loader />) : message}
                    </div>
                    {sender === 'user' && (
                        <img src="user.png" alt="user image" width="50" className="chat-message-profile" />
                    )}
                </div>
            );
        }

        function ChatMessages({ curr, updateFunc, useref }) {
            React.useEffect(() => {
                useref.current.scrollTop = useref.current.scrollHeight;
            }, [curr]);

            return (
                <div className="chat-messages-container" ref={useref}>
                    {curr.map((chatmessage) => {
                        return (
                            <ChatMessage
                                key={chatmessage.key}
                                message={chatmessage.message}
                                sender={chatmessage.sender}
                            />
                        );
                    })}
                </div>
            );
        }

        function Footer({ refer }) {

            const [isTop, setIsTop] = useState(false)

            function changeCss(event) {
                if (!isTop) {
                    refer.current.className = "chatbot-box-top";
                    setIsTop(true);
                }
                else {
                    refer.current.className = "chatbot-box";
                       setIsTop(false);
                }
            }
            return (
                <div className="footer">
                    <div onClick={changeCss}>
                        {isTop ? "Hello, Chatbot welcomes you! click here to move to bottom" : "Hello, Chatbot welcomes you! click here to  move to top"}
                    </div>
                </div>
            );
        }

        const container = document.querySelector('.container');

        function App() {
            const [curr, updateFunc] = React.useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const useref = React.useRef(null);
            const refer = React.useRef(null);

            return (
                <div className="chatbot-container">
                    <div className="chatbot-box" ref={refer}>

                        <ChatMessages curr={curr} updateFunc={updateFunc} useref={useref} />
                        <ChatInput
                            curr={curr}
                            updateFunc={updateFunc}
                            isLoading={isLoading}
                            setIsLoading={setIsLoading}
                        />

                    </div>
                    <Footer refer={refer} />
                </div>
            );
        }
        ReactDOM.createRoot(container).render(<App />);
    </script>
</body>

</html>
