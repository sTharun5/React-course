<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 18px;
        }
        .button-on{
            background-color: rgb(25, 135, 84);
            color: white;
            border-width: 1px;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

    .button-off{
     background-color: rgb(220, 53, 69);
     color: white;
     border-width: 1px;
     border: none;
     padding: 12px 20px;
     border-radius: 5px;
     cursor: pointer;
 }
    </style>
</head>
<body>
<div class="root"></div>
<script src="https://unpkg.com/supersimpledev/react.js" crossorigin></script>
<script src="https://unpkg.com/supersimpledev/react-dom.js" crossorigin></script>
<script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
<script src="https://unpkg.com/supersimpledev/babel.js"></script>

<script type="text/babel">
    function Button(){
        const [isOn,setIsOn] = React.useState(true);
        function offOrOn(){
            setIsOn(!isOn);
        }

        return (
            <>
                <button className={isOn?"button-on":"button-off"} onClick={offOrOn}>{isOn?"ON":"OFF"}</button>
            </>
        );
    }
    const root = document.querySelector(".root");
    ReactDOM.createRoot(root).render(<Button/>);
</script>
</body>

</html>
