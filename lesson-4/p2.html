<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            font-family:sans-serif;
        }
        p{
            font-size: 20px;
        }

        .input-box{
            display: flex;
            flex-direction: column;
            max-width: 250px;
            margin-top: 25px;

        }

        .input{
            border-radius: 6px;
            border-width: 1px;
            padding: 10px 12px;
            margin-bottom: 10px;

        }

        .button-container{
             margin-top: 15px;
        }
        .button{
            background-color: rgb(0,123,255);
            color: white;
            padding: 12px;
            border-radius: 7px;
            border: none;
            margin: 3px;

        }
        .pass-container{
            display: flex;
            align-items: start;
            position: relative;

        }


        .pass-button{

           position: absolute;
           right: 10px;
            margin-top: 10px;

        }

        .pass-input{
               border-radius: 6px;
                border-width: 1px;
                padding: 10px 12px;
             margin-bottom: 0px;
            flex: 1;
        }



    </style>
</head>
<body>
    <div class="root"></div>
<script src="https://unpkg.com/supersimpledev/react.js" crossorigin></script>
<script src="https://unpkg.com/supersimpledev/react-dom.js" crossorigin></script>
<script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
<script src="https://unpkg.com/supersimpledev/babel.js"></script>

<script type="text/babel">







    function App() {

        const [show,setShow]= React.useState(true);
        const[isThere,setIsThere] = React.useState(false);
        return (
            <>
                <p>Hello, Welcome to My Website</p>
                <div className="input-box">
                <input type="text" placeholder = "Email" className = "input"/>
                <div className="pass-container">
                <input type={show ? "text" : "password"}placeholder = "Password" className = "pass-input" onChange={(event)=>{
                    if(event.target.value.length != 0)setIsThere(true);
                    else setIsThere(false);
                }}/>
                {isThere && <button className="pass-button" onClick = {()=>{
                    setShow(!show);
                 }}>{show?"hide":"show"}</button>}
                 </div>
                </div>
                <div className="button-container">
                <button className="button">Login</button>
                <button className="button">Sign up</button>
                </div>

            </>
        );

    }


 const root = document.querySelector(".root");
 ReactDOM.createRoot(root).render(<App/>);
</script>
</body>
</html>
